name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Extract project from ZIP
        run: |
          sudo apt-get install -y unzip
          unzip haqak_app_complete.zip
          mv flutter_app/* .
          mv flutter_app/.* . 2>/dev/null || true
          rm -rf flutter_app haqak_app_complete.zip

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: haqak-app-apk
          path: build/app/outputs/flutter-apk/app-release.apk
